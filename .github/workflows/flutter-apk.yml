name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Create full Flutter project
        run: |
          flutter create temp_app
          cp -r lib temp_app/
          cp pubspec.yaml temp_app/

      - name: Build APK
        run: |
          cd temp_app
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quiz-app-apk
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk
