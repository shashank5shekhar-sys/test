name: quiz_app
description: A modern dark-mode quiz app for students with Supabase backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # UI & Navigation
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Image Picker
  image_picker: ^1.0.7

  # Shared Preferences (local storage)
  shared_preferences: ^2.2.3

  # Loading / Overlay
  flutter_spinkit: ^5.2.1

  # URL Launcher (optional)
  url_launcher: ^6.2.6

  # Cached Network Image
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
