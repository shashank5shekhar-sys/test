name: Build Flutter APK (Temp App)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          cache: true

      - name: Create temp project
        run: flutter create temp_app

      - name: Copy project files
        run: |
          rm -rf temp_app/lib
          cp -r lib temp_app/
          cp pubspec.yaml temp_app/
          cp -r assets temp_app/ || true
          cp -r supabase temp_app/ || true

      - name: Fix working directory
        run: cd temp_app && flutter pub get

      - name: Build APK
        run: cd temp_app && flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quiz-app-temp-apk
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk
